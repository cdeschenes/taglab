services:
  taglab:
    image: ghcr.io/cdeschenes/taglab:latest
    build: .
    container_name: taglab
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${HOST_MEDIA_PATH}:/media:rw
      - ./cache:/cache:rw
    environment:
      LIBRARIES: "/media:media"
      CACHE_PATH: /cache
      ORGANIZE_TARGET: /organized
    env_file:
      - .env

# ── Multiple libraries ────────────────────────────────────────────────────────
# Mount each library to a sub-path inside the container and set LIBRARIES to a
# comma-separated list of  /container/path:Display Label  pairs.
# The first entry becomes the default library on startup.
#
# Example:
#
#   volumes:
#     - /srv/music:/media/music:rw
#     - /srv/podcasts:/media/podcasts:rw
#     - ./cache:/cache:rw
#   environment:
#     LIBRARIES: "/media/music:Music Collection,/media/podcasts:Podcasts"
#     CACHE_PATH: /cache
#
# When LIBRARIES is set, MEDIA_PATH is ignored.
# Each library gets its own SQLite index under CACHE_PATH.
# ─────────────────────────────────────────────────────────────────────────────

# To share a Docker network with Navidrome, add:
#
# networks:
#   - media-net
#
# networks:
#   media-net:
#     external: true
#     name: media-net

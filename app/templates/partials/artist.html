<div class="artist-page"
     x-data='artistPage({{ albums | tojson }}, {{ artist | tojson }}, {{ artist_path | tojson }})'
     x-init="init()"
     style="padding:20px">

  <!-- Header -->
  <div class="editor-header" style="margin-bottom:12px">
    <div class="editor-title">
      <span>{{ artist }}</span>
    </div>
    <div style="color:var(--text-dim);font-size:12px">
      {{ albums | length }} album{{ 's' if albums | length != 1 }}
    </div>
  </div>

  <!-- Last.fm info card (lazy-loaded) -->
  <div hx-get="/api/lastfm/artist?artist={{ artist | urlencode }}"
       hx-trigger="load"
       hx-swap="innerHTML"
       style="margin-bottom:16px">
  </div>

  <!-- Action bar -->
  <div class="action-bar" style="margin-bottom:20px">
    <div class="action-group">
      <button class="btn" @click="bulkEditAllAlbums()">Edit All Albums</button>
      <button class="btn" @click="fetchAllLyrics()" :disabled="bulkRunning">Fetch Lyrics</button>
      <button class="btn" @click="calculateAllRG()" :disabled="bulkRunning">ReplayGain</button>
      {% if organize_enabled %}
      <button class="btn" @click="organizeAllAlbums()" :disabled="bulkRunning">Organize All Albums</button>
      {% endif %}
    </div>
    <div class="action-group" x-show="deleteEnabled" style="margin-left: auto">
      <button class="btn btn-danger" @click="trashArtist()">Move to Trash</button>
    </div>
  </div>

  {% if not albums %}
  <div class="empty-state">
    <p>No albums indexed for this artist. The library scan may still be in progress.</p>
  </div>
  {% else %}

  <!-- Album grid with cover management -->
  <div class="cover-grid">
    <template x-for="(card, i) in cards" :key="i">
      <div class="cover-card">

        <!-- Cover image / drop zone -->
        <div class="cover-card-img-wrap"
             :class="{ 'drag-over': dragging[i] }"
             @click="navigateAlbum(card)"
             @dragover.prevent="onDragOver(i)"
             @dragleave="onDragLeave(i)"
             @drop.prevent="dropFile(i, $event)">

          <img :id="'ap-cover-img-' + i"
               :src="card.imgSrc"
               :alt="card.album"
               style="width:100%;height:100%;object-fit:cover;"
               @error="onImgError($event)">

          <div class="cover-card-overlay">
            <button class="btn-icon" title="Upload file" @click.stop="pickFile(i)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </button>
            <button class="btn-icon" title="Search cover art" @click.stop="searchCovers(i)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
            <button class="btn-icon" title="Enter URL" @click.stop="toggleUrl(i)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </button>
            <button class="btn-icon" title="Open album editor" @click.stop="navigateAlbum(card)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>

          <div x-show="card.uploading"
               style="position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;">
            Uploading&hellip;
          </div>
        </div>

        <input type="file" accept="image/jpeg,image/png,image/webp"
               :id="'ap-file-input-' + i"
               style="display:none"
               @change="uploadFile(i, $event)">

        <!-- Label -->
        <div class="cover-card-label">
          <div style="font-weight:600;font-size:12px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               @click="navigateAlbum(card)"
               x-text="card.album"
               title="Open album editor"></div>
          <div class="cover-dims" x-text="card.dims || (card.trackCount + ' track' + (card.trackCount !== 1 ? 's' : ''))"></div>
        </div>

        <!-- URL row -->
        <div class="cover-card-url-row" x-show="card.showUrl" @click.stop>
          <input type="url"
                 x-model="card.urlInput"
                 placeholder="https://..."
                 @keydown.enter="uploadUrl(i)"
                 style="flex:1;font-size:11px;padding:4px 6px;">
          <button class="btn btn-sm btn-primary" @click="uploadUrl(i)">OK</button>
        </div>

      </div>
    </template>
  </div>

  <!-- Cover search modal -->
  <div x-show="showCoverSearch" x-cloak class="cover-search-overlay" @click.self="showCoverSearch = false; activeSearchIdx = null">
    <div class="cover-search-modal">
      <div class="cover-search-header">
        <span>Search Cover Art</span>
        <button @click="showCoverSearch = false; activeSearchIdx = null">&#x2715;</button>
      </div>
      <div x-show="coverSearchLoading" class="cover-search-loading">Searching&hellip;</div>
      <div class="cover-search-body" x-show="!coverSearchLoading">
        <template x-for="group in coverSearchGroups" :key="group.source">
          <div class="csg-section">
            <div class="csg-header" @click="group.expanded = !group.expanded">
              <span class="csg-source-name" x-text="group.source"></span>
              <span class="csg-count" x-text="group.covers.length + ' releases'"></span>
              <span class="csg-chevron" :class="{ 'csg-chevron-collapsed': !group.expanded }">&#x25BE;</span>
            </div>
            <div class="csg-images" x-show="group.expanded && group.covers.length > 0">
              <template x-for="(cover, ci) in group.covers" :key="ci">
                <div class="csg-image-item" @click="selectSearchCover(cover)">
                  <img :src="cover.thumbnail" loading="lazy" alt="">
                  <div class="csg-meta" x-text="[cover.dims, cover.format].filter(Boolean).join(' \u2022 ')"></div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  {% endif %}
</div>
